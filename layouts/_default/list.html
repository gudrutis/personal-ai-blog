{{ define "main" }}
<h1 class="mb-4">{{ .Title }}</h1>
<div class="row g-4">
  {{ range .Paginator.Pages }}
    <div class="col-md-6">
      <article class="card h-100">
        <div class="card-body">
          <h2 class="h5"><a class="text-decoration-none" href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
          <p class="text-muted mb-2">{{ .Date.Format "Jan 2, 2006" }}</p>
          <p>{{ .Summary | truncate 150 }}</p>
        </div>
      </article>
    </div>
  {{ end }}
</div>
{{ template "_internal/pagination.html" . }}
{{ end }}
