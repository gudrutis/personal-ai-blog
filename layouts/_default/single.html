{{ define "main" }}
<article class="mx-auto" style="max-width: 760px;">
  <h1>{{ .Title }}</h1>
  <p class="text-muted">{{ .Date.Format "January 2, 2006" }}</p>
  {{ with .Params.tags }}
    <p>
      {{ range . }}<span class="badge text-bg-light border">#{{ . }}</span> {{ end }}
    </p>
  {{ end }}
  <div class="content">{{ .Content }}</div>
</article>
{{ end }}
